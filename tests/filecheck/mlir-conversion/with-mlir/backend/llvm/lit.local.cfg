import os
import shutil

# Match llc/llvm-diff to mlir-translate's install
# a system llc on PATH may be older and reject newer IR.
bindir = os.path.dirname(shutil.which("mlir-translate") or "")
for tool in ("llc", "llvm-diff"):
    path = os.path.join(bindir, tool)
    if bindir and os.path.exists(path):
        config.available_features.add(tool)
        config.substitutions.append((f"%{tool}", path))
