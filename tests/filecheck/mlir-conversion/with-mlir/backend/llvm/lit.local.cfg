import os
import shutil

# Match llvm-diff to mlir-translate's install so we use a compatible version.
bindir = os.path.dirname(shutil.which("mlir-translate") or "")
path = os.path.join(bindir, "llvm-diff")
if bindir and os.path.exists(path):
    config.available_features.add("llvm-diff")
    config.substitutions.append(("%llvm-diff", path))
