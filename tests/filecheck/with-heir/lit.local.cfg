import shutil

config.substitutions.append(('HEIR_ROUNDTRIP', "xdsl-opt %s | heir-opt --allow-unregistered-dialect | xdsl-opt | filecheck %s"))
config.substitutions.append(("HEIR_GENERIC_ROUNDTRIP", "xdsl-opt %s --print-op-generic | heir-opt --mlir-print-op-generic --allow-unregistered-dialect --mlir-print-local-scope | xdsl-opt | filecheck %s"))

if not shutil.which("heir-opt"):
    config.unsupported = True
